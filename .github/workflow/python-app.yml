name: RecipeFinder Test Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-application:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-2019, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install paramiko pillow reportlab svglib

    - name: Run App Test (Linux/Debian)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        xvfb-run python -c "import RecipeFinder"

    - name: Run App Test (Windows)
      if: matrix.os != 'ubuntu-latest'
      shell: powershell
      run: |
        python -c "import RecipeFinder"
